name: "npm Config Set"
description: "Sets npm scope registry and auth token via `npm config set`."
author: "Stephen Lautier"

branding:
  icon: "package"
  color: "red"

inputs:
  scope:
    required: true
    description: "npm scope to configure e.g. '@arcane' or 'arcane'."
  registry:
    required: true
    description: "Registry URL to associate with the scope e.g. 'https://f.feedz.io/sketch7/arcane/npm/'."
  token:
    required: true
    description: "Auth token for the registry."
  path:
    required: false
    description: "Directory path (relative to workspace) that contains the `.npmrc` to update (the `.npmrc` filename is appended automatically). When omitted the global user config is used."

runs:
  using: "node24"
  main: "../dist/npm-config-set/index.js"
